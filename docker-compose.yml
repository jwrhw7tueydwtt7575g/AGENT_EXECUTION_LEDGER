# =============================================================
# Agent Execution Ledger — Docker Compose
# Usage:
#   docker compose up --build          # Start everything
#   docker compose up backend          # Backend only
#   docker compose up frontend         # Frontend only
#   docker compose down                # Stop & remove containers
# =============================================================

version: "3.9"

# ---- Shared network ----
networks:
  ledger-net:
    driver: bridge

# ---- Services ----
services:

  # ----------------------------------------------------------
  # Backend — FastAPI + Uvicorn
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ledger-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Explicitly set these so docker-compose env takes priority
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    networks:
      - ledger-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Persistent embedding model cache across rebuilds
    volumes:
      - model_cache:/root/.cache/torch
      - model_cache:/root/.cache/huggingface

  # ----------------------------------------------------------
  # Frontend — Vite build served by nginx
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=http://localhost:8000
        - VITE_WS_URL=ws://localhost:8000/ws/live
        - VITE_APP_NAME=Agent Execution Ledger
        - VITE_APP_VERSION=1.0.0
        - VITE_ENABLE_LIVE_FEED=true
    container_name: ledger-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ledger-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

# ---- Volumes ----
volumes:
  model_cache:
    driver: local
